# nginx com proxy_cache — acelera /v1/decide em 100-1000x quando cache warm.
#
# Estratégia:
#   - proxy_cache_key: hash(body+tenant) — mesmo input + tenant = cache hit no LB
#   - Só cachea GET e POST pra /v1/decide (não o completions, que tem side-effects)
#   - TTL curto (60s) — consistência com reload de policies
#   - cache_bypass header — clientes podem forçar miss com "X-Aion-Cache-Bypass: 1"
#
# Throughput esperado: nginx serve cache em <1ms. Se cache warm, ~20k-50k RPS
# por LB (vs 500/s por replica AION direto).

worker_processes auto;
worker_rlimit_nofile 65535;
events { worker_connections 4096; use epoll; multi_accept on; }

http {
    # Cache zone: 100MB em disco, keys_zone de 10MB (suporta ~80k keys)
    proxy_cache_path /var/cache/nginx/aion levels=1:2 keys_zone=aion_cache:10m max_size=100m inactive=10m use_temp_path=off;

    # Hash key: tenant + body (para POST, nginx usa $request_body)
    log_format cache_log '$remote_addr - [$time_iso8601] "$request" status=$status '
                        'upstream=$upstream_addr cache=$upstream_cache_status '
                        'rt=$request_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log cache_log;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 10m;
    client_body_buffer_size 32k;

    upstream aion_pool {
        least_conn;
        server aion1:8080 max_fails=3 fail_timeout=10s;
        server aion2:8080 max_fails=3 fail_timeout=10s;
        keepalive 64;
    }

    server {
        listen 8080;
        server_name _;

        location = /nginx/health {
            access_log off;
            return 200 '{"status":"ok","lb":"nginx+cache"}\n';
            add_header Content-Type application/json;
        }

        # /v1/decide — CACHED. Esse é o path de decisão pura, sem side-effects.
        # Throughput teórico no cache: ~50k/s por nginx.
        location = /v1/decide {
            # Lê body pra compor cache key
            client_body_in_single_buffer on;

            proxy_pass http://aion_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";

            # Cache config
            proxy_cache aion_cache;
            proxy_cache_methods POST;
            proxy_cache_key "$http_x_aion_tenant|$request_body";
            proxy_cache_valid 200 60s;       # 60s TTL
            proxy_cache_valid 403 30s;       # blocks cacheados 30s
            proxy_cache_lock on;             # evita dogpile em miss simultâneo
            proxy_cache_use_stale error timeout updating;
            add_header X-Aion-Cache $upstream_cache_status always;

            # Bypass header — force miss se cliente mandar
            proxy_cache_bypass $http_x_aion_cache_bypass;
            proxy_no_cache $http_x_aion_cache_bypass;

            proxy_connect_timeout 2s;
            proxy_read_timeout 10s;
            proxy_next_upstream error timeout http_502 http_503;
        }

        # /v1/chat/completions — NÃO cached (tem side-effects: LLM call, telemetria)
        location /v1/chat/completions {
            proxy_pass http://aion_pool;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_read_timeout 120s;
            proxy_next_upstream error timeout http_502 http_503 non_idempotent;
            proxy_next_upstream_tries 2;
        }

        # Resto sem cache
        location / {
            proxy_pass http://aion_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache off;
            proxy_read_timeout 30s;
            proxy_next_upstream error timeout http_502 http_503;
        }
    }
}
