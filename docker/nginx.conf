# nginx load balancer — distribui traffic entre 3 AION replicas
# Estratégia: least_conn + retry em falha + health check passivo

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    log_format aion_combined '$remote_addr - [$time_iso8601] '
                             '"$request" $status upstream=$upstream_addr '
                             'rt=$request_time urt=$upstream_response_time '
                             'tenant="$http_x_aion_tenant" replica="$upstream_http_x_aion_replica"';
    access_log /var/log/nginx/access.log aion_combined;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # AION upstream pool
    upstream aion_pool {
        least_conn;
        server aion1:8080 max_fails=3 fail_timeout=10s;
        server aion2:8080 max_fails=3 fail_timeout=10s;
        server aion3:8080 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # Mirror target for shadow deploys (FASE 7.2 — configurável)
    # upstream aion_shadow { server aion-shadow:8080; }

    server {
        listen 8080;
        server_name _;

        # Healthcheck do próprio LB (não toca em backend)
        location = /nginx/health {
            access_log off;
            return 200 '{"status":"ok","lb":"nginx"}\n';
            add_header Content-Type application/json;
        }

        # Backend health (via pool)
        location /ready {
            proxy_pass http://aion_pool;
            proxy_connect_timeout 2s;
            proxy_read_timeout 5s;
            proxy_next_upstream error timeout http_502 http_503;
        }

        location /health {
            proxy_pass http://aion_pool;
            proxy_connect_timeout 2s;
            proxy_read_timeout 5s;
        }

        # SSE streaming — desabilita buffering
        location /v1/chat/completions {
            proxy_pass http://aion_pool;
            proxy_http_version 1.1;

            # Streaming requirements
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection "";
            chunked_transfer_encoding on;

            # Pass through client headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 120s;

            proxy_next_upstream error timeout http_502 http_503 non_idempotent;
            proxy_next_upstream_tries 2;

            # ── Shadow deploy (descomentar pra ativar mirror 10%) ──
            # mirror /shadow;
            # mirror_request_body on;
        }

        # location = /shadow {
        #     internal;
        #     proxy_pass http://aion_shadow$request_uri;
        # }

        # Tudo mais vai pro pool
        location / {
            proxy_pass http://aion_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            proxy_next_upstream error timeout http_502 http_503;
        }
    }
}
