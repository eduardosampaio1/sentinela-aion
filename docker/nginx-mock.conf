# Demo investor — nginx interceptor.
# Intercepta endpoints que o console 0.1.x espera mas a imagem GHCR 0.1.0
# do AION ainda não publica (ex: /v1/intelligence/{tenant}/intents).
# Tudo o que não casar é proxiado direto pro AION.

server {
  listen 8080;
  server_name _;

  # Endpoint faltante na imagem 0.1.0 — retorna mock realista.
  location ~ ^/v1/intelligence/[^/]+/intents$ {
    default_type application/json;
    return 200 '{"tenant":"default","count":4,"intents":[{"name":"greeting","requests":412,"bypassed":411,"forwarded":1,"bypass_success_rate":0.998,"avg_cost_when_forwarded":0.0,"followup_rate":0.02,"confidence":"high"},{"name":"code_help","requests":287,"bypassed":12,"forwarded":275,"bypass_success_rate":0.04,"avg_cost_when_forwarded":0.0034,"followup_rate":0.31,"confidence":"stable"},{"name":"factual_question","requests":156,"bypassed":89,"forwarded":67,"bypass_success_rate":0.92,"avg_cost_when_forwarded":0.0021,"followup_rate":0.18,"confidence":"warm"},{"name":"creative_writing","requests":41,"bypassed":0,"forwarded":41,"bypass_success_rate":0.0,"avg_cost_when_forwarded":0.0089,"followup_rate":0.55,"confidence":"cold"}]}';
  }

  # /v1/models na imagem 0.1.0 retorna só 1 modelo — a página /routing
  # espera o registry completo do config/models.yaml. Mock com os 4 modelos.
  location = /v1/models {
    default_type application/json;
    return 200 '{"models":[{"id":"gpt-4o-mini","provider":"openai","type":"default","cost_per_1k_input":0.00015,"cost_per_1k_output":0.0006,"max_tokens":16384,"latency_p50_ms":300,"capabilities":["fast","cheap","general"],"complexity_range":[0,40],"risk_tier":"low"},{"id":"gpt-4o","provider":"openai","type":"available","cost_per_1k_input":0.0025,"cost_per_1k_output":0.01,"max_tokens":128000,"latency_p50_ms":800,"capabilities":["balanced","reasoning","code"],"complexity_range":[30,70],"risk_tier":"medium"},{"id":"claude-sonnet-4-6","provider":"anthropic","type":"available","cost_per_1k_input":0.003,"cost_per_1k_output":0.015,"max_tokens":200000,"latency_p50_ms":1000,"capabilities":["premium","reasoning","code","analysis"],"complexity_range":[50,100],"risk_tier":"high"},{"id":"gemini-2.0-flash","provider":"google","type":"available","cost_per_1k_input":0.0001,"cost_per_1k_output":0.0004,"max_tokens":1000000,"latency_p50_ms":250,"capabilities":["fast","cheap","long_context"],"complexity_range":[0,50],"risk_tier":"low"}]}';
  }

  # Tudo resto: proxy transparente para o backend AION.
  location / {
    proxy_pass http://aion:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_read_timeout 600s;
  }
}
