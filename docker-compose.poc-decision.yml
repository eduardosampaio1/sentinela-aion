# AION — POC Decision-Only
# ============================================================
# MODO RECOMENDADO para banco, telecom e enterprise restritivo.
#
# Fluxo:
#   App do cliente → POST /v1/decide → AION → Decision Contract
#   → App do cliente chama a LLM com suas próprias credenciais
#
# AION nunca recebe credencial de LLM. Menor superfície de integração.
# Menor fricção com CISO, jurídico e arquitetura de segurança.
#
# Setup:
#   cp .env.poc-decision.example .env
#   # Edite .env com AION_LICENSE, AION_ADMIN_KEY, AION_CONSOLE_PROXY_KEY,
#   # AION_SESSION_AUDIT_SECRET e CONSOLE_AUTH_SECRET (todos obrigatórios)
#   docker compose -f docker-compose.poc-decision.yml up -d
#
# Verificar:
#   curl http://localhost:8080/health
#   curl http://localhost:8080/ready
#
# Testar:
#   curl -s http://localhost:8080/v1/decide \
#     -H "Content-Type: application/json" \
#     -H "X-Aion-Tenant: poc" \
#     -d '{"model":"gpt-4o","messages":[{"role":"user","content":"Olá"}]}' | jq .
#
# Exemplo de resposta:
#   {"decision":"bypass","bypass_response":"Olá! Como posso ajudar?","latency_ms":2.1}
#
# Decisões possíveis:
#   bypass   → AION respondeu diretamente (saudação, intent trivial) — não chame o LLM
#   block    → AION bloqueou (policy violation, PII, jailbreak) — não chame o LLM
#   continue → AION aprovado — chame seu próprio LLM normalmente
#
# Não inclui:
#   - credencial de LLM (AION não chama LLM neste modo)
#   - telemetria externa (Baluarte/ARGOS não são dependência desta POC)
#   - Supabase ou qualquer serviço da Baluarte
# ============================================================

services:
  aion:
    image: ghcr.io/eduardosampaio1/sentinela-aion:latest
    ports:
      - "8080:8080"
    environment:
      # Licença JWT — obrigatório para subir o servidor
      # Gerada pela Baluarte (contato@baluarte.ai) — uma por cliente/ambiente
      AION_LICENSE: ${AION_LICENSE}

      # Profile: staging mantém warnings críticos no boot e fecha o ciclo dos
      # gates de segurança (F-03/F-04/F-12/F-37). Para hard-abort, use
      # AION_PROFILE=production e garanta TODAS as envs abaixo configuradas.
      AION_PROFILE: ${AION_PROFILE:-staging}

      # Auth admin + console proxy.
      # AION_ADMIN_KEY combina (a) chave de operação humana e (b) chave do
      # console como `console_proxy` — sem `console_proxy` o console retorna 401
      # ao chamar /v1/admin/*. Formato: "chave1:admin,chave2:console_proxy".
      AION_ADMIN_KEY: ${AION_ADMIN_KEY},${AION_CONSOLE_PROXY_KEY}:console_proxy

      # Audit trail HMAC (F-03) — obrigatório. Sem este segredo a trilha de
      # auditoria fica forjável (SHA-256 sem HMAC). Gere com: openssl rand -hex 32
      AION_SESSION_AUDIT_SECRET: ${AION_SESSION_AUDIT_SECRET}

      # Modo: ESTIXE + NOMOS ativos para decisão completa
      # METIS desligado — compressão não se aplica em Decision-Only
      AION_ESTIXE_ENABLED: "true"
      AION_NOMOS_ENABLED: "true"
      AION_METIS_ENABLED: "false"

      # Identificação do modo — F-37 enforça runtime: /v1/chat/completions e
      # /v1/chat/assisted retornam 403; só /v1/decide e /v1/decisions respondem.
      AION_MODE: "poc_decision"

      # Comportamento em falha: fail-open (request passa, AION não bloqueia)
      AION_FAIL_MODE: "open"
      AION_PORT: "8080"

      # Multi-tenancy (opcional — use para isolar por equipe/projeto)
      AION_REQUIRE_TENANT: "false"
      AION_DEFAULT_TENANT: "default"

      # Redis local — velocity detection, decision cache, durable counters,
      # explain store (F-07/F-10).
      REDIS_URL: "redis://redis:6379/0"

      # Telemetria externa DESLIGADA — zero dados saem do ambiente
      # Ativar apenas em Shadow Mode, após DPA assinado com Baluarte
      AION_CONTRIBUTE_GLOBAL_LEARNING: "false"

      # Collective: catálogo editorial apenas — lifecycle administrativo
      # Installed policies NÃO são aplicadas no runtime nesta fase
      AION_COLLECTIVE_ENABLED: "true"

    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/ready').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  aion-console:
    build:
      context: ./aion-console
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # Segredo de sessão (NextAuth v5). OBRIGATÓRIO. Sem fallback —
      # se ${CONSOLE_AUTH_SECRET} estiver vazio o compose recusa a subir.
      # Gere com: openssl rand -hex 32
      AUTH_SECRET: ${CONSOLE_AUTH_SECRET:?CONSOLE_AUTH_SECRET is required (openssl rand -hex 32)}
      NEXT_PUBLIC_AION_TENANT: default
      NEXT_PUBLIC_DEMO_MODE: "false"
      AION_DEFAULT_ROLE: viewer
      # Aponta para o runtime na rede interna do compose
      AION_API_URL: http://aion:8080
      # Chave de serviço usada pelo proxy server-side do console no header
      # `Authorization: Bearer <AION_API_KEY>`. Tem que casar com a chave
      # console_proxy declarada em AION_ADMIN_KEY no serviço `aion`.
      AION_API_KEY: ${AION_CONSOLE_PROXY_KEY:?AION_CONSOLE_PROXY_KEY is required}
    depends_on:
      aion:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M
