name: Publish Docker Image

on:
  push:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install bandit pip-audit

      - name: Run unit tests
        run: |
          if [ -f Makefile ] && grep -q "test-fast" Makefile; then
            make test-fast
          else
            python -m pytest tests/ -x -q --timeout=120
          fi
        timeout-minutes: 10

      - name: SAST scanning with Bandit
        run: |
          bandit -r aion/ -ll -f json -o bandit-results.json || true
          bandit -r aion/ -ll || true

      - name: Dependency audit
        run: pip-audit --strict || true
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: bandit-results.json
          retention-days: 30

  build-and-push:
    needs: quality-checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required by cosign for keyless signing (OIDC token)
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate build_id
        id: build_id
        run: |
          BUILD_ID="build_$(date +%Y%m%d_%H%M%S)_${GITHUB_SHA::8}"
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT

      - name: Set up Python for manifest signing
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install manifest signing dependencies
        run: pip install cryptography pyjwt

      - name: Sign integrity manifest
        env:
          AION_ARTIFACT_SIGNING_KEY_PATH: ${{ secrets.SENTINELA_ARTIFACT_SIGNING_KEY_PATH }}
        run: |
          SIGN_ARGS="--build-id ${{ steps.build_id.outputs.build_id }}"
          if [[ -n "$AION_ARTIFACT_SIGNING_KEY_PATH" ]]; then
            SIGN_ARGS="$SIGN_ARGS --artifact-key $AION_ARTIFACT_SIGNING_KEY_PATH"
          fi
          python tools/generate_manifest.py $SIGN_ARGS \
            --files-root . \
            --out aion/trust_guard/integrity_manifest.json
          echo "Integrity manifest signed for build ${{ steps.build_id.outputs.build_id }}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            AION_BUILD_ID=${{ steps.build_id.outputs.build_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Cosign: sign the image digest (keyless via GitHub OIDC) ──────────────
      # Customers verify with:
      #   cosign verify \
      #     --certificate-identity-regexp "https://github.com/YOUR_ORG/aion/.*" \
      #     --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
      #     ghcr.io/YOUR_ORG/aion@sha256:DIGEST
      - name: Sign image with cosign (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images="$images ${tag}@${DIGEST}"
          done
          cosign sign --yes $images

      # ── Attach manifest attestation ───────────────────────────────────────────
      - name: Attest integrity manifest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate aion/trust_guard/integrity_manifest.json \
            --type https://sentinela.io/trust-guard/integrity/v1 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}

      # ── Container vulnerability scan ─────────────────────────────────────────
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
