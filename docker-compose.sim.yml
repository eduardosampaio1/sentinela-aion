# AION-sim — produção simulada com Docker Compose
#
# Stack:
#   - nginx (LB) na porta 8080   → distribui para 3 AION replicas
#   - 3x aion replicas                → processo AION idêntico
#   - redis                          → velocity + overrides + rate limits distribuídos
#   - mock-llm na porta 8001     → LLM fake OpenAI-compatible (custo zero)
#   - console na porta 3000      → chat web + trace panel
#   - aion-console na porta 3001 → painel de controle Next.js
#   - jaeger na porta 16686      → distributed tracing UI
#   - prometheus na porta 9090   → metrics scraping
#   - grafana na porta 3030      → dashboards
#
# Subir:  docker compose up -d
# Parar:  docker compose down
# Logs:   docker compose logs -f aion1

name: aion-sim

services:
  # ────────────────────────────────────────────
  # Core AION stack
  # ────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: aion-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5
    restart: unless-stopped

  mock-llm:
    build:
      context: .
      dockerfile: docker/Dockerfile.mock_llm
    container_name: aion-mock-llm
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()"]
      interval: 10s
      timeout: 2s
      retries: 3
    restart: unless-stopped

  aion1: &aion-common
    build:
      context: ./aion
      dockerfile: ../docker/Dockerfile.aion
    container_name: aion1
    depends_on:
      redis:
        condition: service_healthy
      mock-llm:
        condition: service_healthy
    environment:
      - AION_PORT=8080
      - AION_ENVIRONMENT=staging
      - AION_LOG_LEVEL=info
      - AION_FAIL_MODE=open
      - AION_ESTIXE_ENABLED=true
      - AION_NOMOS_ENABLED=true
      - AION_METIS_ENABLED=true
      - AION_DEFAULT_BASE_URL=http://mock-llm:8001/v1
      - OPENAI_API_KEY=sk-sim-demo-not-real
      - REDIS_URL=redis://redis:6379/0
      - AION_REQUIRE_CHAT_AUTH=false
      - AION_REQUIRE_TENANT=false
      - AION_CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://localhost:8080
      - ESTIXE_BYPASS_THRESHOLD=0.80
      - AION_REPLICA_ID=aion1
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=aion-aion1
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
    volumes:
      - aion-runtime-1:/var/aion/runtime
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"

  aion2:
    <<: *aion-common
    container_name: aion2
    environment:
      - AION_PORT=8080
      - AION_ENVIRONMENT=staging
      - AION_LOG_LEVEL=info
      - AION_FAIL_MODE=open
      - AION_ESTIXE_ENABLED=true
      - AION_NOMOS_ENABLED=true
      - AION_METIS_ENABLED=true
      - AION_DEFAULT_BASE_URL=http://mock-llm:8001/v1
      - OPENAI_API_KEY=sk-sim-demo-not-real
      - REDIS_URL=redis://redis:6379/0
      - AION_REQUIRE_CHAT_AUTH=false
      - AION_REQUIRE_TENANT=false
      - AION_CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://localhost:8080
      - ESTIXE_BYPASS_THRESHOLD=0.80
      - AION_REPLICA_ID=aion2
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=aion-aion2
      - OTEL_TRACES_EXPORTER=otlp
    volumes:
      - aion-runtime-2:/var/aion/runtime

  aion3:
    <<: *aion-common
    container_name: aion3
    environment:
      - AION_PORT=8080
      - AION_ENVIRONMENT=staging
      - AION_LOG_LEVEL=info
      - AION_FAIL_MODE=open
      - AION_ESTIXE_ENABLED=true
      - AION_NOMOS_ENABLED=true
      - AION_METIS_ENABLED=true
      - AION_DEFAULT_BASE_URL=http://mock-llm:8001/v1
      - OPENAI_API_KEY=sk-sim-demo-not-real
      - REDIS_URL=redis://redis:6379/0
      - AION_REQUIRE_CHAT_AUTH=false
      - AION_REQUIRE_TENANT=false
      - AION_CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://localhost:8080
      - ESTIXE_BYPASS_THRESHOLD=0.80
      - AION_REPLICA_ID=aion3
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=aion-aion3
      - OTEL_TRACES_EXPORTER=otlp
    volumes:
      - aion-runtime-3:/var/aion/runtime

  nginx:
    image: nginx:1.27-alpine
    container_name: aion-nginx
    depends_on:
      - aion1
      - aion2
      - aion3
    ports:
      - "8080:8080"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/ready"]
      interval: 5s
      timeout: 2s
      retries: 3
    restart: unless-stopped

  # ────────────────────────────────────────────
  # Observability
  # ────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: aion-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # UI
      - "4317:4317"      # OTLP gRPC
      - "4318:4318"      # OTLP HTTP
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: aion-prometheus
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: aion-grafana
    depends_on:
      - prometheus
    ports:
      - "3030:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana-provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped

  # ────────────────────────────────────────────
  # Console UIs (depend on nginx LB)
  # ────────────────────────────────────────────

  console:
    image: python:3.11-slim
    container_name: aion-console
    depends_on:
      - nginx
    ports:
      - "3000:3000"
    volumes:
      - ./console:/app
    working_dir: /app
    environment:
      - AION_URL=http://nginx:8080
    command: python server.py
    restart: unless-stopped

volumes:
  redis-data:
  aion-runtime-1:
  aion-runtime-2:
  aion-runtime-3:
  prometheus-data:
  grafana-data:
