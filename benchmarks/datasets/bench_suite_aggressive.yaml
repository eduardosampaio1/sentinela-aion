  # ── COMPRESSION prompts (4, >400 chars each) ──

  - id: agg_compression_001
    tier: complex
    category: compression
    prompt: "I need a comprehensive analysis of our current software architecture. We have a monolithic application written in Java Spring Boot that has been in production for 7 years. The application currently handles approximately 50,000 daily active users and processes around 2 million transactions per day. The main pain points we are experiencing include: (1) deployment cycles that take 4-6 hours and require full system downtime, (2) inability to scale specific high-load components independently, (3) development velocity has dropped significantly as the codebase has grown to 800k lines, (4) a single bug in one module can bring down the entire system, (5) different teams are blocked by each other due to shared code ownership. Please provide a detailed migration strategy to microservices."
    expected_pattern: "Strangler Fig pattern, domain decomposition, incremental migration, anti-corruption layer"
    expected_decision: "CALL_LLM"

  - id: agg_compression_002
    tier: complex
    category: compression
    prompt: "Our company is planning to expand globally and we need to redesign our data architecture to support multi-region deployment across North America, Europe, Asia-Pacific, and Latin America. The current system uses a single PostgreSQL instance located in US-East-1 and serves all 15 million registered users worldwide. We are experiencing latency issues for users in APAC (averaging 350ms) and LATAM (averaging 280ms). Additionally, we have strict data residency requirements: European user data must stay in the EU due to GDPR, health data for US users must remain in the US due to HIPAA, and Brazilian user data must stay in Brazil due to LGPD. We also need to maintain strong consistency for financial transactions while allowing eventual consistency for non-critical user preferences and analytics data. Please provide a complete multi-region database architecture proposal."
    expected_pattern: "Multi-region Postgres, data residency per jurisdiction, sync for financial data, async replication for preferences"
    expected_decision: "CALL_LLM"

  - id: agg_compression_003
    tier: complex
    category: compression
    prompt: "We are building an AI-powered customer service platform that will handle support inquiries for 200 enterprise clients, each with their own knowledge base, tone guidelines, and escalation policies. The system needs to: (1) route incoming tickets to the right AI model based on complexity and topic, (2) maintain conversation context across multiple interactions with the same customer, (3) detect when a conversation should be escalated to a human agent, (4) learn from human agent resolutions to improve future responses, (5) provide audit trails for compliance purposes showing exactly what the AI said and why, (6) enforce per-client content policies and brand guidelines, (7) handle 50,000 simultaneous conversations with sub-200ms response times, (8) support 15 languages with culturally appropriate responses. Please design the complete system architecture including the AI pipeline, infrastructure, and data model."
    expected_pattern: "Multi-tenant LLM gateway, RAG per tenant, conversation state, escalation classifier, audit trail, model routing"
    expected_decision: "CALL_LLM"

  - id: agg_compression_004
    tier: complex
    category: compression
    prompt: "Our fintech startup needs to build a comprehensive risk management and compliance platform before launching our lending product. We will offer personal loans ranging from R$1,000 to R$50,000 with terms between 6 and 36 months. The platform must: (1) perform real-time credit scoring by integrating with Serasa, SPC, and the open banking APIs for bank statement analysis, (2) comply with BACEN Resolução 4.966 on credit risk management, (3) implement anti-fraud detection combining behavioral biometrics, device fingerprinting, and document verification, (4) automate LGPD consent management and data subject requests, (5) generate regulatory reports for BACEN and the Receita Federal automatically, (6) implement a model risk management framework as required by BACEN for AI-based credit decisions, (7) maintain complete audit trails for all credit decisions with explainability for declined applications as required by Brazilian consumer law. Please provide the complete technical architecture and compliance framework."
    expected_pattern: "Open banking integration, credit bureau APIs, LGPD compliance, model explainability, BACEN reporting, audit trail"
    expected_decision: "CALL_LLM"

