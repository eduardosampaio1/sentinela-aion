  - id: c_code_001
    tier: complex
    category: routing
    prompt: |
      Implement a thread-safe LRU cache in Python using only standard library.
      Requirements:
      - O(1) get and put operations
      - Configurable max size
      - Thread-safe via threading.Lock
      - Clean API: cache.get(key), cache.put(key, value)
      - Evict least recently used on overflow
      Provide unit tests demonstrating thread safety.
    expected_pattern: "LRU cache using OrderedDict and threading.Lock, with get/put O(1) via move_to_end, evicting oldest via popitem(last=False), and unit tests covering concurrent access."
    language: en
    tags: [code, complex, concurrency]

  - id: c_analysis_001
    tier: complex
    category: routing
    prompt: |
      Analyze the trade-offs between event sourcing and traditional CRUD architecture
      for a financial transaction system. Consider: consistency, auditability,
      performance, operational complexity, and team expertise required.
      Recommend which approach you would choose and justify with specific reasoning.
    expected_pattern: "Event sourcing provides full audit trail and time travel but adds operational complexity and requires expertise. CRUD is simpler but loses history. For financial systems, event sourcing is typically preferred for audit and compliance reasons, but only if the team has the capacity to manage the increased complexity."
    language: en
    tags: [architecture, analysis, complex]

  - id: c_design_001
    tier: complex
    category: routing
    prompt: |
      Design a system to handle 1 million concurrent WebSocket connections for
      a real-time chat application. Address:
      - Load balancing strategy
      - Session affinity requirements
      - Fan-out for group messages
      - Message persistence
      - Failover handling
      - Horizontal scaling approach
    expected_pattern: "Use multiple WebSocket server instances behind a load balancer with sticky sessions. Publish messages via Redis pub-sub or Kafka for fan-out. Persist messages in Cassandra or DynamoDB. Handle failover with consistent hashing and connection recovery. Scale horizontally by adding server instances; partition users by tenant or region."
    language: en
    tags: [design, distributed, complex]

  - id: c_debug_001
    tier: complex
    category: routing
    prompt: |
      A production service is intermittently returning 504 errors. The service
      calls three downstream APIs in sequence. Logs show no errors in the service
      itself. Metrics show CPU usage is normal. The issue started after a recent
      deployment that added retry logic to the HTTP client. What are the likely
      causes and how would you diagnose and fix this?
    expected_pattern: "Likely causes: retry amplification increasing total latency beyond the gateway timeout, connection pool exhaustion, retry loops on non-idempotent operations. Diagnose by measuring per-request total latency, checking retry counts in logs, verifying connection pool size. Fix by reducing retry budget, using exponential backoff, increasing gateway timeout, or making operations idempotent."
    language: en
    tags: [debug, complex]

  - id: c_algo_001
    tier: complex
    category: routing
    prompt: |
      Given a stream of integers, design a data structure that supports the
      following operations in optimal time complexity:
      1. add(value)
      2. median()
      3. top_k(k) returning the k largest
      Analyze time and space complexity for each.
    expected_pattern: "Use two heaps for median: max-heap for lower half, min-heap for upper half, both sized within 1. Median is top of larger heap or average. Add is O(log n). For top_k, maintain a min-heap of size k; add is O(log k) per element, top_k returns in O(k log k). Space O(n) for full stream, O(k) for top_k heap."
    language: en
    tags: [algorithms, complex]

  - id: c_reasoning_001
    tier: complex
    category: routing
    prompt: |
      Three suspects A, B, C are being questioned about a theft.
      A says: "B did it"
      B says: "A is lying"
      C says: "I did not do it"
      Exactly one is telling the truth, and exactly one committed the theft.
      Who is the thief? Explain your reasoning step by step.
    expected_pattern: "If A is truthful, B did it, meaning B's statement 'A is lying' is false, meaning A is truthful — consistent. Then C's 'I did not do it' is false, meaning C did it — contradiction (B was the thief). If B is truthful, A is lying meaning B did NOT do it. C's statement is false meaning C did it. Consistent. Answer: C is the thief, B is the truthful one."
    language: en
    tags: [reasoning, logic, complex]

  - id: c_sql_001
    tier: complex
    category: routing
    prompt: |
      You have three tables: users (id, name, created_at), orders (id, user_id, total, created_at),
      products (id, order_id, category, price). Write a SQL query that returns the top 10 users by
      total spend in the last 90 days, along with their most-purchased product category.
    expected_pattern: "WITH recent_orders AS (SELECT user_id, SUM(total) AS spend FROM orders WHERE created_at >= NOW() - INTERVAL '90 days' GROUP BY user_id), top_users AS (SELECT user_id, spend FROM recent_orders ORDER BY spend DESC LIMIT 10), top_category AS (SELECT o.user_id, p.category, COUNT(*) AS cnt, ROW_NUMBER() OVER (PARTITION BY o.user_id ORDER BY COUNT(*) DESC) AS rn FROM orders o JOIN products p ON p.order_id = o.id GROUP BY o.user_id, p.category) SELECT u.name, tu.spend, tc.category FROM top_users tu JOIN users u ON u.id = tu.user_id JOIN top_category tc ON tc.user_id = tu.user_id AND tc.rn = 1;"
    language: en
    tags: [sql, complex]

  - id: c_ml_001
    tier: complex
    category: routing
    prompt: |
      You need to build a system that detects fraud in credit card transactions
      in real time. Discuss:
      - Data preparation challenges (class imbalance, drift)
      - Feature engineering (behavioral, temporal, aggregations)
      - Model choices (logistic regression vs gradient boosting vs neural nets)
      - Serving architecture (latency constraints, retraining cadence)
      - Monitoring and concept drift detection
    expected_pattern: "Class imbalance requires under/oversampling or cost-weighted loss. Feature engineering combines transactional (amount, merchant), temporal (hour, day), behavioral (rolling stats per card), and network (shared devices). Gradient boosting often wins for tabular; neural nets for embeddings. Serve via real-time API with sub-100ms latency, cache features, retrain daily. Monitor feature distributions for drift, alert on precision/recall degradation."
    language: en
    tags: [ml, complex, system]

  - id: c_api_001
    tier: complex
    category: routing
    prompt: |
      Design a RESTful API for a multi-tenant SaaS application that manages
      projects and tasks. Include:
      - URL structure
      - Authentication approach
      - Pagination, filtering, sorting strategy
      - Versioning strategy
      - Rate limiting
      - Error response format
    expected_pattern: "URLs: /v1/projects and /v1/projects/{id}/tasks. Auth via OAuth2 with tenant in JWT claim. Pagination with cursor-based links for consistency. Filters via query params, sort via ?sort=field,-otherfield. Versioning in URL path. Rate limit per-tenant and per-user with 429 responses and Retry-After header. Errors in RFC 7807 problem+json format."
    language: en
    tags: [api, design, complex]

  - id: c_perf_001
    tier: complex
    category: routing
    prompt: |
      A Postgres query that was taking 50ms is now taking 5 seconds. The table
      has 10 million rows and was recently bulk-loaded with 1 million new rows.
      The query uses an index. EXPLAIN ANALYZE shows a sequential scan. Walk
      me through the diagnosis and fix.
    expected_pattern: "Recent bulk load likely invalidated statistics. Planner is choosing seq scan because cost estimates are stale. Run ANALYZE on the table. Also check for index bloat (may need REINDEX). Verify the index covers the predicate and is usable (not disabled). If still slow, check shared_buffers, effective_cache_size, and consider partial indexes if the query hits a hot subset."
    language: en
    tags: [database, performance, complex]

  - id: c_review_001
    tier: complex
    category: routing
    prompt: |
      Review this Python code for production readiness:
      ```
      def send_payment(user_id, amount, currency):
          payment_api.post("/charges", {"user": user_id, "amount": amount, "currency": currency})
          log.info(f"Sent payment to {user_id}")
          return True
      ```
      Identify issues and suggest improvements.
    expected_pattern: "Issues: no error handling, no timeout, logs user PII, does not return the charge ID or confirmation, not idempotent (risks double-charging on retry), no validation of inputs, no rate limiting, no observability. Fixes: add try/except with retries, pass idempotency key, redact user identifier in logs, return typed result with charge_id and status, validate amount > 0 and currency in allowed list, add metrics for success/failure."
    language: en
    tags: [review, complex]

  - id: c_strategy_001
    tier: complex
    category: routing
    prompt: |
      Our company has 50 microservices in production. Technical debt is piling up.
      Observability is inconsistent. Teams duplicate code. CI/CD pipelines vary.
      As a new platform engineering lead, outline a 90-day plan to stabilize and
      standardize without slowing down product development.
    expected_pattern: "First 30 days: audit and inventory, identify highest-pain areas. Establish standards for observability (logs, metrics, traces), CI/CD templates, and shared libraries. Days 31-60: roll out platform tooling (service catalog, golden path templates) and embed platform engineers with teams. Days 61-90: migrate highest-traffic services to standards, measure MTTR and developer productivity improvements. Communicate wins continuously. Avoid big-bang rewrites."
    language: en
    tags: [strategy, complex]

  - id: c_security_001
    tier: complex
    category: routing
    prompt: |
      A security audit found that our user uploads (images, documents) are
      served directly from S3 to the browser. The audit flagged this as a
      risk of stored XSS and SSRF. Explain the risks in detail and propose
      a mitigation strategy.
    expected_pattern: "Stored XSS: malicious HTML/JS uploaded and served with text/html MIME can execute in user browsers. SSRF: uploaded SVG with external references can trigger server-side requests to internal services. Mitigation: serve uploads from a different domain (isolation), force Content-Type to safe values, sanitize SVG, set Content-Security-Policy, use signed URLs with short TTLs, scan uploads for malware, never trust user-supplied file names or MIME types."
    language: en
    tags: [security, complex]

  - id: c_chaos_001
    tier: complex
    category: routing
    prompt: |
      Design a chaos engineering experiment to test the resilience of a
      checkout service that depends on payment processing, inventory, and
      notification services. Define the hypothesis, blast radius, observability
      requirements, and rollback plan.
    expected_pattern: "Hypothesis: checkout tolerates 30-second payment service timeout without breaking user experience. Blast radius: 1 percent of production traffic, one region, business hours only. Observability: track checkout success rate, latency p95, error types; alert on anomaly. Rollback: automated abort if error rate > 5 percent. Run for 30 minutes, analyze metrics, widen blast radius progressively."
    language: en
    tags: [resilience, complex]

  - id: c_caching_001
    tier: complex
    category: routing
    prompt: |
      You are designing a caching layer for a high-traffic e-commerce API.
      Compare cache-aside, write-through, and write-behind strategies.
      Recommend one for product catalog data and one for shopping cart data.
      Justify.
    expected_pattern: "Cache-aside: app reads cache, loads from DB on miss, writes back. Simple but risks staleness. Write-through: writes go to cache and DB atomically. Consistent but slower writes. Write-behind: writes go to cache only, flushed async to DB. Fast but risks data loss. Catalog: cache-aside with TTL — reads are heavy, writes infrequent. Cart: write-through with user-scoped key — must be consistent for user, tolerable write cost."
    language: en
    tags: [caching, complex]

  - id: c_migration_001
    tier: complex
    category: routing
    prompt: |
      We need to migrate from PostgreSQL 11 to PostgreSQL 16 with zero downtime
      for a 2 TB database used by 50 microservices. Walk me through the plan.
    expected_pattern: "Use logical replication: setup PG16 as a replica via pg_logical or publications. Sync schema first, then data. Monitor replication lag. Switch read traffic to PG16 gradually. Pause writes briefly, catch up replication, switch writes to PG16, validate. Keep PG11 as fallback for 48h. Document rollback. Run smoke tests post-cutover. Coordinate with all 50 services for connection string changes."
    language: en
    tags: [migration, database, complex]

  - id: c_cost_001
    tier: complex
    category: routing
    prompt: |
      Our AWS bill has grown 30 percent year-over-year. Outline a cost
      optimization strategy covering compute, storage, network egress, and
      observability tooling. Prioritize by expected impact.
    expected_pattern: "Compute: use Savings Plans or Reserved Instances for stable workloads, right-size EC2, use Spot for fault-tolerant tasks, Graviton for ARM-friendly apps. Storage: lifecycle policies for S3, delete old snapshots, reclaim EBS. Network: minimize cross-AZ traffic, use VPC endpoints to avoid NAT, CloudFront for egress. Observability: sample logs, adjust retention, evaluate alternative tools. Prioritize by current spend share; usually compute and storage are top."
    language: en
    tags: [cost, cloud, complex]

  - id: c_ml_002
    tier: complex
    category: routing
    prompt: |
      You are asked to evaluate whether to fine-tune a 7B parameter LLM or use
      RAG with a smaller model for a customer support chatbot. Customer has:
      - 10 years of labeled support conversations (500k examples)
      - Frequently updated product catalog
      - Strict privacy: cannot send data to third parties
      - Budget: USD 50k for infra, team of 2 ML engineers
      Recommend an approach.
    expected_pattern: "RAG is likely better: frequently updated catalog means fine-tuning would need constant retraining. 500k examples is large but not overwhelming for retrieval-augmented approach. On-prem constraint favors open-source smaller models (Llama, Mistral). Budget fits infra for a 7-13B model with retrieval. Team of 2 can handle the retrieval pipeline; fine-tuning a 7B from scratch is more expertise-intensive. Consider hybrid: fine-tune on style/tone, use RAG for facts."
    language: en
    tags: [ml, strategy, complex]

  - id: c_observability_001
    tier: complex
    category: routing
    prompt: |
      A latency p99 spike occurred at 2am for 15 minutes across 3 services.
      No alerts fired. Metrics show the spike but logs show nothing unusual.
      Walk me through how you would improve the observability stack so this
      doesn't happen silently next time.
    expected_pattern: "Alerts must fire on p99 breach, not just averages. Check existing alert rules: are they using p99? Too conservative? Add multi-window burn-rate alerts for SLOs. Ensure distributed tracing is enabled to correlate across services. Implement anomaly detection on baselines. Add synthetic monitoring for critical user flows. Review on-call runbooks. Ensure logs capture enough context: request ID, user ID, downstream timings."
    language: en
    tags: [observability, incident, complex]

  - id: c_team_001
    tier: complex
    category: routing
    prompt: |
      You are the new engineering manager of a 10-person team with low morale,
      high technical debt, and frequent production incidents. In 30 days,
      what do you do?
    expected_pattern: "Week 1: 1:1s with every engineer, listen. Audit ongoing work and incidents. Weeks 2-3: identify top 3 pains from 1:1s. Cut scope on non-essential projects to free capacity. Reduce incident load with quick wins (alerting, runbooks, retries). Invest in tests for most fragile areas. Week 4: establish norms (on-call rotation, post-mortems, demo day). Celebrate small wins publicly. Avoid org restructures in first 30 days."
    language: en
    tags: [management, complex]

  - id: c_sre_001
    tier: complex
    category: routing
    prompt: |
      Define SLOs and SLIs for a payment API with 99.9 percent availability
      target. Include error budget policy, burn-rate alerts, and how to
      negotiate with product teams when budget is consumed.
    expected_pattern: "SLIs: availability (successful requests / total), latency p99 (threshold e.g. 500ms). SLO: 99.9 percent availability, 99 percent latency under 500ms. Error budget: 0.1 percent of requests, which is about 43 minutes per month. Burn-rate alerts at 2 percent/hour (fast burn) and 10 percent/24h (slow burn). When budget is consumed: freeze feature releases, focus on reliability work, co-write post-mortems. Make the policy visible and pre-agreed with product."
    language: en
    tags: [sre, complex]

  - id: c_kube_001
    tier: complex
    category: routing
    prompt: |
      Your Kubernetes cluster pods are being OOMKilled intermittently under
      load. Memory requests and limits are set identically to actual usage
      at p95. Walk me through diagnosis and the proper way to set resources.
    expected_pattern: "OOMKilled means a container exceeded its memory limit. Check actual p99/p100 usage, not just p95 — transient spikes get killed. Diagnose with kubectl describe pod to see OOMKilled reason, check kernel logs, use memory profiler. Proper approach: set requests based on average usage for scheduling fairness, set limits based on p99 with safety margin (e.g. 1.5x). Consider memory.limit_in_bytes vs memory.high for soft limits. Investigate memory leaks in the app."
    language: en
    tags: [kubernetes, debug, complex]

  - id: c_threat_001
    tier: complex
    category: routing
    prompt: |
      You have an LLM-powered assistant that customers interact with. Users
      have tried prompt injection to extract the system prompt and bypass
      safety guardrails. Design a defense-in-depth strategy.
    expected_pattern: "Layer 1: input classification detects injection attempts, block or sanitize. Layer 2: structured prompts with clear delimiters between system and user text. Layer 3: output filtering removes leaked instructions. Layer 4: never include secrets or API keys in system prompt. Layer 5: monitor for jailbreak patterns, update patterns continuously. Layer 6: rate limit and anomaly detect. Layer 7: red team periodically. Document the threat model and gaps."
    language: en
    tags: [security, ai, complex]

  - id: c_prompting_001
    tier: complex
    category: routing
    prompt: |
      Design a prompt template for a multilingual customer support bot that
      must: respond in the user's language, escalate sensitive queries, cite
      the source document when answering from a knowledge base, and refuse
      to answer off-topic questions. Provide the template and reasoning.
    expected_pattern: "Template: SYSTEM: You are a support bot for X. Respond in the user's language (detected as {lang}). Only answer questions about product Y and Z. If the query is about billing disputes, legal issues, or contains personal data, respond with 'Transferring to a specialist'. When using knowledge base content, cite as [source: doc_name]. If off-topic, say 'I can only help with X'. USER: {message}. Reasoning: explicit constraints prevent scope creep, citations build trust, escalation keyword triggers downstream routing."
    language: en
    tags: [ai, prompting, complex]

  - id: c_data_001
    tier: complex
    category: routing
    prompt: |
      You have a 500 GB Postgres database that needs to be anonymized for a
      staging environment. The anonymization must: preserve referential
      integrity, keep statistical properties for testing, mask PII, and be
      repeatable. Propose an approach.
    expected_pattern: "Use a deterministic hashing approach with a secret salt so the same input produces the same output across runs (preserving referential integrity). Mask PII columns: names with fake names from a dictionary, emails with hash prefix plus domain, phone numbers with format-preserving encryption. Keep statistical distributions: bucket ages, salaries. Use pgAnonymizer, or custom UPDATE scripts with CASE logic. Audit the result. Store the salt securely; it controls reversibility."
    language: en
    tags: [data, privacy, complex]

  - id: c_legal_001
    tier: complex
    category: routing
    prompt: |
      Your SaaS is expanding to the EU. What technical changes do you need
      to make to comply with GDPR for a platform handling customer data
      of EU citizens?
    expected_pattern: "Data residency: process EU data within EU regions. Consent management: explicit opt-in for non-essential processing. Data subject rights: implement export (portability), deletion (right to be forgotten), and access APIs. Audit logs for all PII access. Encryption at rest and in transit. DPO appointment if processing at scale. Privacy by design in feature development. DPIA for high-risk features. Processor agreements with sub-processors. Breach notification within 72 hours."
    language: en
    tags: [compliance, privacy, complex]

