  # ════════════════════════════════════════════
  # TIER: MEDIUM — routing intelligence (~50 prompts)
  # ════════════════════════════════════════════

  - id: m_analyze_001
    tier: medium
    category: routing
    prompt: "Explain how an LLM works in 3 sentences."
    expected_pattern: "An LLM is a neural network trained on large text corpora. It predicts the next token given context. It learns patterns from data."
    language: en
    tags: [explanation]

  - id: m_analyze_002
    tier: medium
    category: routing
    prompt: "Compare Python and JavaScript in terms of typing."
    expected_pattern: "Python has dynamic typing with optional static hints. JavaScript is dynamically typed. TypeScript adds static types to JS."
    language: en
    tags: [comparison]

  - id: m_analyze_003
    tier: medium
    category: routing
    prompt: "Explique o que e uma API REST em poucas palavras."
    expected_pattern: "Uma API REST e uma interface que usa HTTP para operacoes CRUD sobre recursos identificados por URLs."
    language: pt
    tags: [explanation]

  - id: m_analyze_004
    tier: medium
    category: routing
    prompt: "What are the main differences between SQL and NoSQL databases?"
    expected_pattern: "SQL uses structured tables and relations. NoSQL is flexible and schema-less, handling unstructured data. SQL prioritizes consistency, NoSQL prioritizes scale."
    language: en
    tags: [comparison]

  - id: m_analyze_005
    tier: medium
    category: routing
    prompt: "List three advantages of microservices architecture."
    expected_pattern: "Independent deployment. Technology diversity. Fault isolation and scaling per service."
    language: en
    tags: [list]

  - id: m_code_001
    tier: medium
    category: routing
    prompt: "Write a Python function to compute the factorial of n."
    expected_pattern: "def factorial(n): return 1 if n <= 1 else n * factorial(n - 1)"
    language: en
    tags: [code]

  - id: m_code_002
    tier: medium
    category: routing
    prompt: "Write a JavaScript function that reverses a string."
    expected_pattern: "function reverseString(s) { return s.split('').reverse().join(''); }"
    language: en
    tags: [code]

  - id: m_code_003
    tier: medium
    category: routing
    prompt: "Escreva uma funcao Python que verifica se um numero e primo."
    expected_pattern: "def is_prime(n): return n > 1 and all(n % i for i in range(2, int(n**0.5) + 1))"
    language: pt
    tags: [code]

  - id: m_code_004
    tier: medium
    category: routing
    prompt: "Write SQL to select users created in the last 30 days."
    expected_pattern: "SELECT * FROM users WHERE created_at >= NOW() - INTERVAL '30 days';"
    language: en
    tags: [sql]

  - id: m_code_005
    tier: medium
    category: routing
    prompt: "Generate a regex that matches Brazilian CPF format."
    expected_pattern: "\\d{3}\\.\\d{3}\\.\\d{3}-\\d{2}"
    language: en
    tags: [regex]

  - id: m_summarize_001
    tier: medium
    category: compression
    prompt: "Summarize the concept of machine learning in one paragraph."
    expected_pattern: "Machine learning is a subset of AI where systems learn patterns from data to make predictions or decisions without explicit programming."
    language: en
    tags: [summarize]

  - id: m_summarize_002
    tier: medium
    category: compression
    prompt: "Resuma em 2 frases o que e blockchain."
    expected_pattern: "Blockchain e um registro distribuido e imutavel de transacoes. Garante seguranca via criptografia e consenso entre nos."
    language: pt
    tags: [summarize]

  - id: m_howto_001
    tier: medium
    category: routing
    prompt: "How do I deploy a Python app to production?"
    expected_pattern: "Containerize with Docker, push to a registry, deploy via Kubernetes or a PaaS, set up monitoring."
    language: en
    tags: [howto]

  - id: m_howto_002
    tier: medium
    category: routing
    prompt: "Como configurar HTTPS em um servidor nginx?"
    expected_pattern: "Obtenha certificado via Let's Encrypt com certbot, configure os blocos server com ssl_certificate e ssl_certificate_key, redirecione HTTP para HTTPS."
    language: pt
    tags: [howto]

  - id: m_debug_001
    tier: medium
    category: routing
    prompt: "Why might a Python script give 'ModuleNotFoundError' after installing a package?"
    expected_pattern: "Wrong Python environment. Virtual env not activated. Package installed globally but script uses venv, or vice-versa."
    language: en
    tags: [debug]

  - id: m_arch_001
    tier: medium
    category: routing
    prompt: "When should I use a message queue instead of direct HTTP calls?"
    expected_pattern: "Async processing, decoupling services, handling spikes, guaranteed delivery, long-running tasks, retry logic."
    language: en
    tags: [architecture]

  - id: m_arch_002
    tier: medium
    category: routing
    prompt: "Quando usar Redis em vez de um banco relacional?"
    expected_pattern: "Cache de alta velocidade, sessoes, filas, rate limiting, contadores, pub/sub. Nao como fonte de verdade."
    language: pt
    tags: [architecture]

  - id: m_ethics_001
    tier: medium
    category: routing
    prompt: "What are the main ethical concerns in deploying AI to production?"
    expected_pattern: "Bias and fairness, privacy, transparency, accountability, safety, job displacement, misuse potential."
    language: en
    tags: [ethics]

  - id: m_perf_001
    tier: medium
    category: routing
    prompt: "Give three tips to make a SQL query faster."
    expected_pattern: "Add indexes on filtered columns. Avoid SELECT *. Analyze the execution plan. Use LIMIT and pagination."
    language: en
    tags: [performance]

  - id: m_secure_001
    tier: medium
    category: routing
    prompt: "List common OWASP top 10 vulnerabilities."
    expected_pattern: "Injection, broken authentication, sensitive data exposure, XXE, broken access control, security misconfiguration, XSS, insecure deserialization, using components with known vulnerabilities, insufficient logging."
    language: en
    tags: [security]

  - id: m_api_001
    tier: medium
    category: routing
    prompt: "Explique a diferenca entre PUT e PATCH em REST."
    expected_pattern: "PUT substitui o recurso inteiro (idempotente). PATCH aplica uma atualizacao parcial. Ambos devem ser idempotentes quando possivel."
    language: pt
    tags: [api]

  - id: m_cloud_001
    tier: medium
    category: routing
    prompt: "What is the difference between IaaS, PaaS and SaaS?"
    expected_pattern: "IaaS provides raw infrastructure. PaaS adds runtime/platform. SaaS delivers finished applications. Responsibility shifts from you to provider going up the stack."
    language: en
    tags: [cloud]

  - id: m_test_001
    tier: medium
    category: routing
    prompt: "Why write unit tests for a REST API?"
    expected_pattern: "Catch regressions, document behavior, enable refactoring, verify edge cases, speed up feedback, support CI/CD."
    language: en
    tags: [testing]

  - id: m_git_001
    tier: medium
    category: routing
    prompt: "What is the difference between git merge and git rebase?"
    expected_pattern: "Merge preserves branch history with a merge commit. Rebase replays commits on top of target for linear history. Rebase rewrites history; use carefully on shared branches."
    language: en
    tags: [git]

  - id: m_ai_001
    tier: medium
    category: routing
    prompt: "Explique em 3 paragrafos o que e fine-tuning de LLMs."
    expected_pattern: "Fine-tuning adapta um modelo pre-treinado a uma tarefa especifica usando dataset menor. Pode ser feito com full fine-tuning ou PEFT. Cuidado com overfitting e custo computacional."
    language: pt
    tags: [ai, explanation]

  - id: m_math_001
    tier: medium
    category: routing
    prompt: "Prove that the sum of the first n integers is n(n+1)/2."
    expected_pattern: "By induction: base case n=1 gives 1 = 1*2/2. Inductive step: assume true for k, then for k+1 the sum is k(k+1)/2 + (k+1) = (k+1)(k+2)/2."
    language: en
    tags: [math, proof]

  - id: m_design_001
    tier: medium
    category: routing
    prompt: "Design a rate limiter for an API."
    expected_pattern: "Use a sliding window or token bucket in Redis. Key by user ID or IP. Set limits per endpoint. Return 429 with Retry-After. Handle bursts and long-term quotas."
    language: en
    tags: [design]

  - id: m_data_001
    tier: medium
    category: routing
    prompt: "How do I handle timezones correctly in a database?"
    expected_pattern: "Always store timestamps in UTC. Use TIMESTAMP WITH TIME ZONE in Postgres. Convert to local timezone only at presentation layer. Document the convention."
    language: en
    tags: [data]

  - id: m_refactor_001
    tier: medium
    category: routing
    prompt: "Refactor this function to be more readable: def f(x): return [i*2 for i in x if i>0]"
    expected_pattern: "def double_positives(numbers): return [n * 2 for n in numbers if n > 0]"
    language: en
    tags: [code, refactor]

  - id: m_explain_001
    tier: medium
    category: routing
    prompt: "Explain Big O notation using the example of binary search."
    expected_pattern: "Big O describes asymptotic complexity. Binary search halves the search space each step, yielding O(log n). Compared to O(n) for linear scan, it is much faster on large n."
    language: en
    tags: [algorithms]

  - id: m_explain_002
    tier: medium
    category: routing
    prompt: "Explique o conceito de closure em JavaScript com exemplo."
    expected_pattern: "Closure e quando uma funcao interna tem acesso as variaveis do escopo externo mesmo apos o retorno. Exemplo: function outer() { let x = 1; return function inner() { return x; }; }"
    language: pt
    tags: [code, explanation]

  - id: m_config_001
    tier: medium
    category: routing
    prompt: "How do I structure environment variables in a Python project?"
    expected_pattern: "Use a .env file with pydantic-settings or python-dotenv. Separate concerns with prefixes. Never commit secrets. Provide .env.example as template."
    language: en
    tags: [config]

  - id: m_test_002
    tier: medium
    category: routing
    prompt: "Difference between a mock and a stub?"
    expected_pattern: "A stub returns canned responses. A mock verifies interactions (method was called with certain args). Stubs are state-based, mocks are behavior-based."
    language: en
    tags: [testing]

  - id: m_auth_001
    tier: medium
    category: routing
    prompt: "Compare JWT and session-based authentication."
    expected_pattern: "JWT is stateless and self-contained, good for distributed systems. Session is stateful, server stores session. JWT has revocation challenges. Sessions easier to invalidate."
    language: en
    tags: [auth]

  - id: m_monitoring_001
    tier: medium
    category: routing
    prompt: "What are the golden signals in observability?"
    expected_pattern: "Latency, traffic, errors, saturation. Introduced in the Google SRE book as core indicators of service health."
    language: en
    tags: [observability]

  - id: m_pattern_001
    tier: medium
    category: routing
    prompt: "Explain the circuit breaker pattern."
    expected_pattern: "Circuit breaker prevents cascading failures by opening after N consecutive failures, rejecting calls for a recovery window, then allowing a trial call to close again."
    language: en
    tags: [pattern]

  - id: m_concurrent_001
    tier: medium
    category: routing
    prompt: "What is the difference between asyncio and threading in Python?"
    expected_pattern: "Asyncio uses a single-threaded event loop for I/O-bound tasks. Threading uses multiple OS threads, limited by GIL for CPU-bound work. Asyncio is cheaper per task."
    language: en
    tags: [concurrency]

  - id: m_distributed_001
    tier: medium
    category: routing
    prompt: "What is CAP theorem?"
    expected_pattern: "Consistency, Availability, Partition tolerance — pick any two. During a partition, a distributed system must choose either consistency or availability."
    language: en
    tags: [distributed]

  - id: m_docker_001
    tier: medium
    category: routing
    prompt: "What is the difference between Docker image and container?"
    expected_pattern: "An image is a read-only template. A container is a running instance of an image. Multiple containers can run from the same image."
    language: en
    tags: [docker]

  - id: m_network_001
    tier: medium
    category: routing
    prompt: "Explain the difference between TCP and UDP."
    expected_pattern: "TCP is connection-oriented and reliable with retransmission. UDP is connectionless and fast but unreliable. Use TCP for data integrity, UDP for real-time or games."
    language: en
    tags: [network]

  - id: m_ci_001
    tier: medium
    category: routing
    prompt: "What are the essential stages in a CI/CD pipeline?"
    expected_pattern: "Lint, build, unit tests, integration tests, security scan, deploy to staging, smoke tests, deploy to production, monitor."
    language: en
    tags: [devops]

  - id: m_privacy_001
    tier: medium
    category: routing
    prompt: "O que o LGPD exige sobre retencao de dados pessoais?"
    expected_pattern: "Minimizar dados coletados, armazenar apenas pelo tempo necessario para a finalidade, informar o titular, permitir exclusao sob solicitacao."
    language: pt
    tags: [privacy, compliance]

  - id: m_ml_001
    tier: medium
    category: routing
    prompt: "Explain overfitting and how to prevent it."
    expected_pattern: "Overfitting is when a model memorizes training data and fails on new data. Prevent with regularization, dropout, more data, cross-validation, early stopping."
    language: en
    tags: [ml]

  - id: m_compress_001
    tier: medium
    category: compression
    prompt: "I am writing a long email to my team. Please help me revise this draft. Here is the draft: We had a very productive meeting yesterday that lasted approximately two hours. During that meeting we discussed many important topics including the roadmap for next quarter the resource allocation for the backend team the timeline for the mobile app launch the budget constraints that we have been facing recently the hiring plan for engineering the customer feedback from the latest release. Please condense this into 3 clear bullet points for the CTO."
    expected_pattern: "Key points from yesterday's meeting: roadmap and resource allocation, mobile app timeline, hiring and budget constraints."
    language: en
    tags: [compression, long_input]

  - id: m_compress_002
    tier: medium
    category: compression
    prompt: "Here is a transcript of a support call. Summarize the customer's main issue in one sentence. Customer: Hi, I'm having a really strange problem with my account. So basically I was trying to log in this morning and I got an error message saying that my password was incorrect. But I'm 100 percent sure my password is right because I just changed it yesterday. So then I tried to use the forgot password feature but I never received the email. I checked my spam folder and it's not there either. I tried three different browsers, same issue. Support agent: I understand..."
    expected_pattern: "Customer cannot log in; password reset email is not arriving."
    language: en
    tags: [compression, long_input]

  - id: m_compress_003
    tier: medium
    category: compression
    prompt: "Below is a detailed bug report. Please extract the reproduction steps only, without the error stack trace or environment details. The bug appears in the checkout flow. When a user adds an item to the cart with a promotional code applied and then switches the currency from USD to EUR, the price shown in the cart does not update to reflect the new currency. We tested this on Chrome 120, Firefox 121, and Safari 17, all on macOS 14.2. The stack trace shows NullPointerException at line 142 of CartController.java. Environment: production, tenant acme_corp, user id 88223."
    expected_pattern: "1. Add an item to the cart. 2. Apply a promotional code. 3. Switch currency from USD to EUR. 4. Observe: cart price does not update."
    language: en
    tags: [compression, long_input]

