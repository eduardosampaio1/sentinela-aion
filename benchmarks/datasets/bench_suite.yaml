# AION Before-vs-After Benchmark Suite
# 150 curated prompts covering simple/medium/complex tiers + edge cases.
#
# Each prompt has:
#   id               : stable identifier
#   tier             : simple | medium | complex | edge
#   category         : bypass_candidate | routing | compression | service | edge
#   prompt           : user message (string)
#   expected_pattern : reference text used for semantic similarity scoring
#   expected_decision: optional — what AION "should" do (BYPASS/CALL_LLM/BLOCK)
#   language         : pt | en | es (mix allowed)
#   tags             : arbitrary labels for filtering

version: "1.0"

