  # ── MEDIUM (25) ──

  - id: medium_001
    tier: medium
    category: routing
    prompt: "explain the difference between REST and GraphQL APIs"
    expected_pattern: "REST uses fixed endpoints while GraphQL allows flexible queries"

  - id: medium_002
    tier: medium
    category: routing
    prompt: "what are the SOLID principles in software engineering?"
    expected_pattern: "Single responsibility, Open-closed, Liskov, Interface segregation, Dependency inversion"

  - id: medium_003
    tier: medium
    category: routing
    prompt: "how does a relational database differ from a NoSQL database?"
    expected_pattern: "relational uses structured tables while NoSQL uses flexible schemas"

  - id: medium_004
    tier: medium
    category: routing
    prompt: "explain what Docker is and why it is useful"
    expected_pattern: "containerization platform that packages applications with dependencies"

  - id: medium_005
    tier: medium
    category: routing
    prompt: "what is the difference between synchronous and asynchronous programming?"
    expected_pattern: "synchronous blocks execution while async allows concurrent operations"

  - id: medium_006
    tier: medium
    category: routing
    prompt: "explain the concept of machine learning in simple terms"
    expected_pattern: "algorithms that learn patterns from data without explicit programming"

  - id: medium_007
    tier: medium
    category: routing
    prompt: "what is a microservices architecture?"
    expected_pattern: "application built as small independent services that communicate over APIs"

  - id: medium_008
    tier: medium
    category: routing
    prompt: "explain the difference between TCP and UDP protocols"
    expected_pattern: "TCP is reliable and ordered while UDP is faster but unreliable"

  - id: medium_009
    tier: medium
    category: routing
    prompt: "what is OAuth 2.0 and how does it work?"
    expected_pattern: "authorization framework that allows third-party access without sharing credentials"

  - id: medium_010
    tier: medium
    category: routing
    prompt: "describe the CAP theorem in distributed systems"
    expected_pattern: "Consistency, Availability, Partition tolerance — only two can be guaranteed simultaneously"

  - id: medium_011
    tier: medium
    category: routing
    prompt: "what is the difference between SQL JOIN types?"
    expected_pattern: "INNER JOIN returns matching rows, LEFT JOIN includes all left rows"

  - id: medium_012
    tier: medium
    category: routing
    prompt: "explain what Kubernetes is used for"
    expected_pattern: "container orchestration for deploying and scaling containerized applications"

  - id: medium_013
    tier: medium
    category: routing
    prompt: "what is event-driven architecture?"
    expected_pattern: "system where components communicate through events and messages"

  - id: medium_014
    tier: medium
    category: routing
    prompt: "explain HTTPS and why it is important for security"
    expected_pattern: "encrypted HTTP using TLS to protect data in transit"

  - id: medium_015
    tier: medium
    category: routing
    prompt: "what is a load balancer and why is it used?"
    expected_pattern: "distributes incoming traffic across multiple servers to improve reliability"

  - id: medium_016
    tier: medium
    category: routing
    prompt: "explain the concept of idempotency in APIs"
    expected_pattern: "operation that produces the same result regardless of how many times it is called"

  - id: medium_017
    tier: medium
    category: routing
    prompt: "what is the difference between authentication and authorization?"
    expected_pattern: "authentication verifies identity while authorization controls access permissions"

  - id: medium_018
    tier: medium
    category: routing
    prompt: "how does a CDN improve website performance?"
    expected_pattern: "serves content from servers geographically closer to users"

  - id: medium_019
    tier: medium
    category: routing
    prompt: "explain rate limiting and its importance in APIs"
    expected_pattern: "restricts number of requests to prevent abuse and ensure fair usage"

  - id: medium_020
    tier: medium
    category: routing
    prompt: "what is Redis and what are its common use cases?"
    expected_pattern: "in-memory data store used for caching, sessions, and real-time data"

  - id: medium_021
    tier: medium
    category: routing
    prompt: "explain the difference between monolith and microservices"
    expected_pattern: "monolith is a single deployable unit while microservices are independent services"

  - id: medium_022
    tier: medium
    category: routing
    prompt: "what is a webhook and how does it work?"
    expected_pattern: "HTTP callback that sends data to a URL when an event occurs"

  - id: medium_023
    tier: medium
    category: routing
    prompt: "explain the concept of database indexing"
    expected_pattern: "data structure that speeds up data retrieval at the cost of extra storage"

  - id: medium_024
    tier: medium
    category: routing
    prompt: "what is CORS and why does it matter?"
    expected_pattern: "browser security mechanism controlling cross-origin resource access"

  - id: medium_025
    tier: medium
    category: routing
    prompt: "explain the Circuit Breaker pattern in microservices"
    expected_pattern: "prevents cascading failures by stopping calls to a failing service"

  # ── COMPLEX (25) ──

  - id: complex_001
    tier: complex
    category: routing
    prompt: "Design a fault-tolerant payment processing pipeline that handles 10,000 transactions per second with exactly-once delivery semantics. Include dead-letter queue design and idempotency keys."
    expected_pattern: "Use event streaming, idempotency keys, dead-letter queues, and distributed locking"

  - id: complex_002
    tier: complex
    category: routing
    prompt: "Architect a multi-tenant SaaS application where each tenant has strict data isolation, independent scaling, and the ability to customize business logic without code deployments."
    expected_pattern: "Use tenant-per-schema or separate databases, feature flags, and plugin architecture"

  - id: complex_003
    tier: complex
    category: routing
    prompt: "Design a real-time fraud detection system for a bank that must evaluate transactions in under 50ms while learning from new fraud patterns continuously. Describe the ML pipeline and serving infrastructure."
    expected_pattern: "Stream processing, feature store, online model serving, feedback loop for continuous learning"

  - id: complex_004
    tier: complex
    category: routing
    prompt: "How would you implement a distributed rate limiter that works across 100+ application nodes with sub-millisecond decisions and eventual consistency? Compare token bucket vs sliding window approaches."
    expected_pattern: "Redis Lua scripts or sliding log, token bucket for smoothness, sliding window for precision"

  - id: complex_005
    tier: complex
    category: routing
    prompt: "Design the database schema for a multi-sided marketplace with dynamic pricing, inventory management, seller commissions, and complex tax rules across 50 jurisdictions."
    expected_pattern: "Separate tables for products, inventory, pricing rules, commissions, tax jurisdictions with audit trail"

  - id: complex_006
    tier: complex
    category: routing
    prompt: "Explain how you would migrate a 10TB PostgreSQL database to a sharded architecture with zero downtime. Include rollback strategy and data consistency validation."
    expected_pattern: "Dual-write pattern, shadow reads, gradual traffic migration, checksum validation"

  - id: complex_007
    tier: complex
    category: routing
    prompt: "Design a CQRS architecture for an e-commerce platform handling 1 million events per day, including event sourcing, projection rebuilding, and eventual consistency handling."
    expected_pattern: "Separate read/write models, event store, projectors, saga pattern for distributed transactions"

  - id: complex_008
    tier: complex
    category: routing
    prompt: "How would you implement a real-time collaborative document editor supporting 10,000 concurrent users with conflict resolution and offline support?"
    expected_pattern: "Operational transformation or CRDT, WebSockets, local-first with sync, vector clocks"

  - id: complex_009
    tier: complex
    category: routing
    prompt: "Design a recommendation engine for a streaming platform with 50 million users that must serve personalized recommendations in under 100ms. Address cold start problem."
    expected_pattern: "Two-tower neural network, ANN index, feature store, fallback to popularity for cold start"

  - id: complex_010
    tier: complex
    category: routing
    prompt: "Architect a zero-trust security model for a fintech company's internal services. Include service mesh, mTLS, policy enforcement points, and audit trail requirements."
    expected_pattern: "Istio/Envoy service mesh, SPIFFE/SPIRE for identity, OPA for policy, centralized audit logging"

  - id: complex_011
    tier: complex
    category: routing
    prompt: "Design a multi-region active-active database setup for a global application requiring sub-50ms latency in 5 continents with strong consistency for financial transactions."
    expected_pattern: "CockroachDB or Spanner for global transactions, read replicas for analytics, consistency vs latency tradeoffs"

  - id: complex_012
    tier: complex
    category: routing
    prompt: "How would you build a data pipeline that processes clickstream data from 10 million daily active users, enriches it in real-time, and makes it available for ML training within 5 minutes?"
    expected_pattern: "Kafka for ingestion, Flink or Spark Streaming for processing, feature store for enrichment, S3 for training"

  - id: complex_013
    tier: complex
    category: routing
    prompt: "Design the CI/CD pipeline for a large monorepo with 200 microservices, ensuring that only affected services are rebuilt and deployed while maintaining deployment atomicity."
    expected_pattern: "Affected service detection via dependency graph, progressive delivery, canary deployments, rollback automation"

  - id: complex_014
    tier: complex
    category: routing
    prompt: "Explain how to implement distributed tracing in a microservices system with 50 services, achieving end-to-end visibility while keeping overhead below 1% of request latency."
    expected_pattern: "OpenTelemetry, sampling strategies, trace propagation headers, centralized backend like Jaeger or Tempo"

  - id: complex_015
    tier: complex
    category: routing
    prompt: "Design a cost optimization strategy for a cloud infrastructure spending $500k/month on AWS, identifying savings opportunities without compromising reliability or performance."
    expected_pattern: "Reserved instances, Spot for batch, right-sizing, S3 lifecycle policies, data transfer optimization"

  - id: complex_016
    tier: complex
    category: routing
    prompt: "How would you design a system to detect and prevent prompt injection attacks in an LLM-powered application serving enterprise customers?"
    expected_pattern: "Input sanitization, system prompt hardening, output filtering, semantic similarity detection, rate limiting"

  - id: complex_017
    tier: complex
    category: routing
    prompt: "Design a search engine for a legal document repository with 100 million documents, supporting semantic search, exact phrase matching, and jurisdiction-based filtering."
    expected_pattern: "Dense retrieval with FAISS or Pinecone, BM25 for exact match, metadata filters, reranking"

  - id: complex_018
    tier: complex
    category: routing
    prompt: "Architect a background job processing system handling 1 billion jobs per day with priority queues, job deduplication, and retry with exponential backoff."
    expected_pattern: "Message queue per priority tier, idempotency keys for dedup, dead-letter queues, exponential backoff"

  - id: complex_019
    tier: complex
    category: routing
    prompt: "Design an API gateway that handles 500k requests per second with authentication, rate limiting, caching, and request transformation across 30 backend services."
    expected_pattern: "Horizontal scaling, Redis for rate limiting and cache, JWT validation, circuit breakers"

  - id: complex_020
    tier: complex
    category: routing
    prompt: "How would you implement a feature flag system supporting gradual rollouts, A/B testing, user targeting, and instant kill switches for a platform with 10 million users?"
    expected_pattern: "Evaluation service, consistent hashing for user bucketing, real-time config updates, analytics integration"

  - id: complex_021
    tier: complex
    category: routing
    prompt: "Design a healthcare data platform that must comply with HIPAA, support HL7 FHIR standards, and provide real-time analytics while ensuring PHI never leaves the patient's jurisdiction."
    expected_pattern: "Data residency controls, encryption at rest and transit, FHIR R4 API, audit logs, de-identification pipeline"

  - id: complex_022
    tier: complex
    category: routing
    prompt: "Explain how to build a vector database from scratch for semantic search, including the indexing algorithm choices and approximate nearest neighbor tradeoffs."
    expected_pattern: "HNSW or IVF indexing, recall vs latency tradeoff, segment-based storage, distance metrics"

  - id: complex_023
    tier: complex
    category: routing
    prompt: "Design an incident management system for an SRE team managing 200 microservices, including automatic correlation, escalation policies, and post-mortem automation."
    expected_pattern: "Alert correlation engine, PagerDuty integration, runbook automation, blameless post-mortem templates"

  - id: complex_024
    tier: complex
    category: routing
    prompt: "How would you implement a content moderation system using LLMs that processes 10 million user posts per day with sub-second latency and 99.9% accuracy?"
    expected_pattern: "Fast tier with heuristics, ML classifier, LLM for ambiguous cases, human review queue, feedback loop"

  - id: complex_025
    tier: complex
    category: routing
    prompt: "Design a financial reporting system that consolidates data from 50 source systems, handles currency conversion, and produces IFRS-compliant reports with full audit trail."
    expected_pattern: "ETL pipeline, exchange rate service, ledger with immutable audit log, reconciliation engine"

