# AION — Modo Decisão (POC)
#
# Neste modo o AION NÃO fala com o LLM.
# Ele retorna a decisão (BLOCK / BYPASS / CONTINUE) para a sua app,
# que é responsável por chamar o LLM com suas próprias credenciais.
#
# Fluxo:
#   App → POST /v1/decide → AION → decisão → App → LLM (se CONTINUE)
#
# Setup (3 comandos):
#   1. curl -O https://raw.githubusercontent.com/eduardosampaio1/sentinela-aion/main/docker-compose.poc.yml
#   2. echo "AION_LICENSE=<seu-jwt>" > .env
#   3. docker compose -f docker-compose.poc.yml up -d
#
# Verificar: curl http://localhost:8080/health

services:
  aion:
    image: ghcr.io/eduardosampaio1/sentinela-aion:latest
    ports:
      - "8080:8080"
    environment:
      # Licença (obrigatório)
      AION_LICENSE: ${AION_LICENSE}

      # Modo decisão: ESTIXE ativo, NOMOS/METIS desligados
      AION_ESTIXE_ENABLED: "true"
      AION_NOMOS_ENABLED: "false"
      AION_METIS_ENABLED: "false"

      # Comportamento seguro: se AION falhar, deixa passar
      AION_FAIL_MODE: "open"
      AION_PORT: "8080"

      # Multi-tenancy (opcional — remova se não usar)
      AION_REQUIRE_TENANT: "false"
      AION_DEFAULT_TENANT: "default"

    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s  # primeira execução baixa modelo de embeddings (~150 MB)
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
