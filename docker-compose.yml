version: "3.8"

services:
  aion:
    build:
      context: .
      target: production
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - AION_PORT=8080
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s  # embedding model download on cold start
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
