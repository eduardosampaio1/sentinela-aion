# AION-sim LITE — stack reduzida para laptop (~3-4GB RAM)
#
# 1x AION + Redis + mock_llm + console, SEM observability (Grafana/Prom/Jaeger).
#
# Uso:
#   docker compose -f docker-compose.lite.yml up -d
#   docker compose -f docker-compose.lite.yml down
#
# Quando usar: laptop com <16GB RAM, ou quando testando features que não precisam
# validar multi-replica / traces distribuídos. Para FASE 7 (validação final),
# use docker-compose.yml completo (full stack).

name: aion-sim-lite

services:
  redis:
    image: redis:7-alpine
    container_name: aion-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  mock-llm:
    build:
      context: .
      dockerfile: docker/Dockerfile.mock_llm
    container_name: aion-mock-llm
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()"]
      interval: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  aion:
    build:
      context: ./aion
      dockerfile: ../docker/Dockerfile.aion
    container_name: aion
    depends_on:
      redis:
        condition: service_healthy
      mock-llm:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - AION_PORT=8080
      - AION_ENVIRONMENT=staging
      - AION_LOG_LEVEL=info
      - AION_FAIL_MODE=open
      - AION_ESTIXE_ENABLED=true
      - AION_NOMOS_ENABLED=true
      - AION_METIS_ENABLED=true
      - AION_DEFAULT_BASE_URL=http://mock-llm:8001/v1
      - OPENAI_API_KEY=sk-sim-demo-not-real
      - REDIS_URL=redis://redis:6379/0
      - AION_REQUIRE_CHAT_AUTH=false
      - AION_REQUIRE_TENANT=false
      - AION_CORS_ORIGINS=http://localhost:3000,http://localhost:3001
      - ESTIXE_BYPASS_THRESHOLD=0.80
      - AION_REPLICA_ID=aion
      - AION_WORKERS=4        # 4 processos uvicorn — escala quase linear
    volumes:
      - aion-runtime:/var/aion/runtime
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/ready"]
      interval: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2560M     # 2.5GB cap — 4 workers compartilham embedding via fork()
          cpus: "4"

  console:
    image: python:3.11-slim
    container_name: aion-console
    depends_on:
      - aion
    ports:
      - "3000:3000"
    volumes:
      - ./console:/app
    working_dir: /app
    environment:
      - AION_URL=http://aion:8080
    command: python server.py
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  aion-runtime:
