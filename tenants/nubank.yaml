# ══════════════════════════════════════════════════════════════
#  Tenant: nubank — Banco digital líder em crédito e pagamentos
#  Perfil: alto volume, regulado, dados sensíveis, LGPD estrita
# ══════════════════════════════════════════════════════════════

tenant_id: nubank
display_name: "Nubank"
description: "Banco digital - foco em crédito, cartão e conta"

# ── Controles de acesso ──────────────────────────────────────
rate_limit: 200          # requests/min — volume de prod simulado

# ── Política de PII (LGPD Nível Alto) ───────────────────────
# Nubank lida com dados de crédito - política mais restritiva
pii_policy:
  default_action: mask   # qualquer PII não listado → mascara
  rules:
    cpf: mask            # CPF sempre mascarado nas respostas
    rg: mask
    cnpj: mask
    email: mask          # email também mascarado
    phone: mask
    credit_card: block   # cartão de crédito → bloqueia a resposta
    bank_account: mask

# ── Notas para demo ──────────────────────────────────────────
# Cenários de destaque:
#   - Análise de crédito complexa → NOMOS roteia para sim-claude-sonnet
#   - CPF na mensagem → ESTIXE mascara antes de enviar ao LLM
#   - Saudações simples → ESTIXE bypass (sem chamar LLM)
#   - "ignore previous instructions" → ESTIXE block 403
