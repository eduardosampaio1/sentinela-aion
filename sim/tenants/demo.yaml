# ══════════════════════════════════════════════════════════════
#  Tenant: demo — Ambiente de demonstração genérico
#  Perfil: configuração relaxada para exploração livre
# ══════════════════════════════════════════════════════════════

tenant_id: demo
display_name: "Demo"
description: "Ambiente livre para exploração de features"

# ── Controles de acesso ──────────────────────────────────────
rate_limit: 500          # alto para demos sem interrupção

# ── Política de PII (relaxada) ───────────────────────────────
pii_policy:
  default_action: mask   # padrão: mascara
  rules:
    cpf: mask
    email: audit         # apenas audita no tenant demo
    phone: audit
    credit_card: block
    bank_account: audit

# ── Notas para demo ──────────────────────────────────────────
# Tenant genérico para exploração sem restrições de tenant real
