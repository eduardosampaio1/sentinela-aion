# AION Aggressive Benchmark Suite
#
# Opposite philosophy from the conservative suite:
# - ~60% prompts are bypass-able (realistic support / chat traffic)
# - ~20% prompts are large / redundant (METIS compression shines)
# - ~20% prompts are a routing mix (simple vs complex, so NOMOS varies models)
#
# This dataset reflects real call-center / support / sales chat distributions
# where most traffic is small talk, acknowledgements, FAQ, and transactional.
# The goal: demonstrate AION's *economic upside* — 30-50% fewer LLM calls,
# 20-40% less cost, quality preserved.

version: "1.0"

