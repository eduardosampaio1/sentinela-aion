  # ════════════════════════════════════════════
  # LARGE / REDUNDANT prompts (METIS compression territory) — ~20%
  # ════════════════════════════════════════════

  - id: a_metis_001
    tier: medium
    category: compression
    prompt: |
      Hello, I hope you are doing well. I am writing to you today with a
      question about our meeting that happened yesterday. During the meeting,
      which lasted for about two hours and fifteen minutes, we discussed a
      number of different topics that are relevant to the ongoing project.
      These topics included the roadmap for the next quarter of this year,
      the resource allocation for the backend engineering team, the timeline
      for the mobile app launch that has been scheduled for the third quarter,
      the budget constraints that we have been facing recently due to various
      market conditions, the hiring plan for the engineering department, and
      the customer feedback that we have received from the latest release of
      our product. I would like to ask if you could please summarize this
      meeting into three concise bullet points that I could share with the
      CTO who was not able to attend. Thank you very much for your help.
    expected_pattern: "Meeting summary: (1) roadmap and resource allocation; (2) mobile launch timeline and budget; (3) hiring plan and customer feedback."
    language: en
    tags: [compression, long_input, redundant]

  - id: a_metis_002
    tier: medium
    category: compression
    prompt: |
      Please help me understand this situation. So basically what happened is
      that we have been working for about six months on a new feature that was
      supposed to launch in the second quarter of this year. The feature is a
      new dashboard that allows users to see their data in a more organized way.
      However, during the development process, we encountered several technical
      challenges that caused delays. One of the main challenges was related to
      performance: the initial implementation was too slow when dealing with
      large datasets, and we had to redesign the backend to use a different
      data structure. Another challenge was related to user experience: after
      conducting user testing sessions with twelve different users, we found
      that the initial UI was confusing. So we had to redesign the UI as well.
      Now we are behind schedule and the team is stressed. What would you
      recommend we do next?
    expected_pattern: "Recommend: (1) reset timeline with realistic estimate; (2) prioritize core value over polish; (3) communicate transparently; (4) protect team morale with clear scope."
    language: en
    tags: [compression, long_input, redundant]

  - id: a_metis_003
    tier: medium
    category: compression
    prompt: |
      I am going to paste below a transcript of a customer support conversation.
      Please extract only the customer's main issue in a single sentence.
      Customer: Hi there, good afternoon. I hope you can help me.
      Agent: Good afternoon, how can I help you?
      Customer: So I have been trying to log into my account since this morning
      but the system keeps telling me that my password is incorrect. I am
      absolutely sure my password is correct because I just changed it yesterday.
      I tried using the forgot password button but I never got the email.
      I checked my spam folder, I checked the trash folder, and I checked all
      the other folders in my inbox. I tried using three different browsers,
      Chrome, Firefox, and Safari. I tried on my phone and on my laptop.
      Nothing works. I am really frustrated because I need to access my account
      to pay a bill that is due today. Can you please help me?
      Agent: I understand your frustration, let me look into this for you.
    expected_pattern: "Customer cannot log in; the password reset email is not arriving."
    language: en
    tags: [compression, long_input, transcript]

  - id: a_metis_004
    tier: medium
    category: compression
    prompt: |
      Ola, gostaria de pedir a sua ajuda para entender melhor uma situacao
      que esta acontecendo na empresa onde trabalho. Nos ultimos meses temos
      observado uma queda significativa nos indicadores de performance do
      produto, especificamente no engagement dos usuarios. No inicio do ano
      tinhamos uma taxa de retencao de 78%, mas essa taxa caiu para 62% no
      mes passado. Alem disso, o NPS do produto caiu de 52 para 38 no mesmo
      periodo. Fizemos varias analises e entrevistas com usuarios, e
      identificamos alguns problemas: a interface esta confusa depois da
      ultima atualizacao, o tempo de carregamento aumentou em algumas telas
      criticas, e o processo de onboarding esta muito longo. Quais seriam as
      tres primeiras acoes que voce recomendaria para estabilizar esses
      indicadores no proximo trimestre?
    expected_pattern: "Acoes recomendadas: (1) simplificar o onboarding; (2) auditar performance das telas criticas; (3) revisar UX da ultima atualizacao com testes rapidos."
    language: pt
    tags: [compression, long_input]

  - id: a_metis_005
    tier: medium
    category: compression
    prompt: |
      Below is a long bug report. Extract the reproduction steps only.
      Environment: production, tenant acme_corp, user id 88223, Chrome 120
      on macOS Sonoma 14.2, screen resolution 2560x1440, extensions enabled.
      The bug appears in the checkout flow when users try to apply a
      promotional discount code. Specifically, when a user adds an item
      to the shopping cart, then applies a promotional code like WINTER20,
      and then switches the currency in the dropdown from USD to EUR, the
      price displayed in the cart does NOT update to reflect the new currency.
      The promotional discount also disappears at this point, which is
      unexpected. Stack trace shows NullPointerException at line 142 of
      CartController.java. We also see these log entries: INFO cart.updated,
      WARN currency.changed, ERROR discount.lost. Users affected: estimated
      about 200 customers based on analytics events from the last 3 days.
      Severity: high because it affects revenue directly.
    expected_pattern: "Steps: (1) add item to cart; (2) apply promo code WINTER20; (3) switch currency USD to EUR; (4) observe: price does not update and discount is lost."
    language: en
    tags: [compression, long_input]

  - id: a_metis_006
    tier: medium
    category: compression
    prompt: |
      Here are five product reviews from our customers. Please summarize
      the common themes in three bullet points.
      Review 1: The product is great overall but the battery life is shorter
      than I expected. I thought it would last about two days but it only
      lasts one day with moderate use.
      Review 2: Love the design and build quality. However, the battery dies
      too quickly. I have to charge it every evening.
      Review 3: Amazing performance and camera quality. The only downside is
      that the battery could be better. My previous phone lasted longer.
      Review 4: Very satisfied with the purchase. Fast, beautiful, and well
      built. Battery is just okay, not impressive.
      Review 5: Best phone I have ever owned! The only complaint is battery
      life which is mediocre compared to competitors.
    expected_pattern: "Themes: (1) strong positive on design, performance, and build quality; (2) consistent complaint about battery life (common weakness); (3) would win with better battery."
    language: en
    tags: [compression, long_input]

