  - id: a_route_medium_003
    tier: medium
    category: routing
    prompt: "Generate a SQL query to find users who have made more than 5 orders in the last 30 days."
    expected_pattern: "SELECT user_id, COUNT(*) AS orders FROM orders WHERE created_at >= NOW() - INTERVAL '30 days' GROUP BY user_id HAVING COUNT(*) > 5;"
    language: en
    tags: [sql, medium_model]

  - id: a_route_complex_001
    tier: complex
    category: routing
    prompt: |
      Design a globally distributed rate-limiting system for an API that must
      enforce 1000 requests per second per user across 5 data centers with
      strong consistency guarantees. Discuss the trade-offs between Redis
      Cluster, CRDTs, and a central consensus service like etcd.
    expected_pattern: "Strong consistency across 5 DCs requires consensus (etcd, Spanner-like). Redis Cluster gives fast local decisions but risks breaches under partition. CRDTs converge eventually but may temporarily over-permit. Recommend hybrid: local Redis for fast path with periodic reconciliation via consensus; accept small transient breach for latency."
    language: en
    tags: [architecture, complex, premium_model]

  - id: a_route_complex_002
    tier: complex
    category: routing
    prompt: |
      Given a production incident where a postgres 16 replica is lagging by
      45 minutes during peak hours, walk through diagnosis steps, potential
      root causes, and remediation. The primary has 64 GB RAM, 16 cores,
      NVMe storage; replica has identical specs but is geographically remote.
    expected_pattern: "Diagnose: check pg_stat_replication for wal_sender and wal_receiver states, measure network latency between DCs, examine replica CPU and I/O, check for long-running queries on replica, look at checkpoint frequency, and wal_compression settings."
    language: en
    tags: [database, complex, premium_model]

  - id: a_route_complex_003
    tier: complex
    category: routing
    prompt: |
      Your team disagrees on whether to adopt service mesh (Istio) for a
      30-microservice Kubernetes platform. Half the team argues for it
