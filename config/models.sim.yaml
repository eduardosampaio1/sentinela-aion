# NOMOS — Model registry para ambiente de simulação (custo zero, 100% local)
# Todos os modelos apontam para o mock LLM em http://localhost:8001/v1
# Uso: NOMOS_MODELS_CONFIG_PATH=config/models.sim.yaml
version: "1.0"

models:
  - name: sim-gpt-4o-mini
    provider: openai
    api_key_env: OPENAI_API_KEY        # mock não valida — qualquer valor serve
    base_url: "http://localhost:8001/v1"
    cost_per_1k_input: 0.00015
    cost_per_1k_output: 0.0006
    max_tokens: 16384
    latency_p50_ms: 80
    capabilities: [fast, cheap, general]
    complexity_range: [0, 40]          # prompts simples
    risk_tier: low

  - name: sim-gpt-4o
    provider: openai
    api_key_env: OPENAI_API_KEY
    base_url: "http://localhost:8001/v1"
    cost_per_1k_input: 0.0025
    cost_per_1k_output: 0.01
    max_tokens: 128000
    latency_p50_ms: 300
    capabilities: [balanced, reasoning, code]
    complexity_range: [30, 70]         # prompts médios
    risk_tier: medium

  - name: sim-claude-sonnet
    provider: openai                   # openai para usar Bearer auth (mock aceita qualquer)
    api_key_env: OPENAI_API_KEY
    base_url: "http://localhost:8001/v1"
    cost_per_1k_input: 0.003
    cost_per_1k_output: 0.015
    max_tokens: 200000
    latency_p50_ms: 500
    capabilities: [premium, reasoning, code, analysis]
    complexity_range: [50, 100]        # prompts complexos — análise de crédito, LGPD, etc.
    risk_tier: high                    # PII penaliza modelos low-tier, força rota aqui

  - name: sim-gemini-flash
    provider: openai
    api_key_env: OPENAI_API_KEY
    base_url: "http://localhost:8001/v1"
    cost_per_1k_input: 0.0001
    cost_per_1k_output: 0.0004
    max_tokens: 1000000
    latency_p50_ms: 60
    capabilities: [fast, cheap, long_context]
    complexity_range: [0, 50]
    risk_tier: low
