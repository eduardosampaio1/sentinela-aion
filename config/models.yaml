# NOMOS — Model registry
version: "1.0"
# Used by NOMOS to route requests to the best model based on complexity and cost.

models:
  - name: gpt-4o-mini
    provider: openai
    api_key_env: OPENAI_API_KEY
    cost_per_1k_input: 0.00015
    cost_per_1k_output: 0.0006
    max_tokens: 16384
    latency_p50_ms: 300
    capabilities: [fast, cheap, general]
    complexity_range: [0, 40]  # handles simple prompts
    risk_tier: low  # not ideal for sensitive data

  - name: gpt-4o
    provider: openai
    api_key_env: OPENAI_API_KEY
    cost_per_1k_input: 0.0025
    cost_per_1k_output: 0.01
    max_tokens: 128000
    latency_p50_ms: 800
    capabilities: [balanced, reasoning, code]
    complexity_range: [30, 70]  # handles medium prompts
    risk_tier: medium

  - name: claude-sonnet-4-6
    provider: anthropic
    api_key_env: ANTHROPIC_API_KEY
    cost_per_1k_input: 0.003
    cost_per_1k_output: 0.015
    max_tokens: 200000
    latency_p50_ms: 1000
    capabilities: [premium, reasoning, code, analysis]
    complexity_range: [50, 100]  # handles complex prompts
    risk_tier: high  # safe for sensitive data

  - name: gemini-2.0-flash
    provider: google
    api_key_env: GEMINI_API_KEY
    cost_per_1k_input: 0.0001
    cost_per_1k_output: 0.0004
    max_tokens: 1000000
    latency_p50_ms: 250
    capabilities: [fast, cheap, long_context]
    complexity_range: [0, 50]
    risk_tier: low
