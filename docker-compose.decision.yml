# AION — Modo Decision
#
# O AION analisa e decide (BLOCK / BYPASS / CONTINUE) mas NAO fala com o LLM.
# Sua aplicacao e responsavel por chamar o LLM com suas proprias credenciais.
#
# Fluxo:
#   App → POST /v1/decide → AION → decisao → App → LLM (se CONTINUE)
#
# Quando usar este modo:
#   - Cliente nao quer compartilhar chaves do LLM
#   - Cliente tem IA propria (Azure, vLLM, LLaMA, etc.)
#   - Avaliacao inicial (POC) — menor superficie de integracao
#
# Setup (3 comandos):
#   1. curl -O https://raw.githubusercontent.com/eduardosampaio1/sentinela-aion/main/docker-compose.decision.yml
#   2. echo "AION_LICENSE=<seu-jwt>" > .env
#   3. docker compose -f docker-compose.decision.yml up -d
#
# Verificar: curl http://localhost:8080/health

services:
  aion:
    image: ghcr.io/eduardosampaio1/sentinela-aion:latest
    ports:
      - "8080:8080"
    environment:
      # Licenca (obrigatorio)
      AION_LICENSE: ${AION_LICENSE}

      # Modo decision: ESTIXE ativo, NOMOS/METIS desligados
      AION_ESTIXE_ENABLED: "true"
      AION_NOMOS_ENABLED: "false"
      AION_METIS_ENABLED: "false"

      # Comportamento seguro: se AION falhar, deixa passar
      AION_FAIL_MODE: "open"
      AION_PORT: "8080"

      # Multi-tenancy (opcional)
      AION_REQUIRE_TENANT: "false"
      AION_DEFAULT_TENANT: "default"

    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
